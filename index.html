<!DOCTYPE html>
<html>
<head>
<title>AI Fitness Planner</title>

<style>

body{
font-family: Arial, sans-serif;

/* Background images */
background-image:
url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438"),
url("https://images.unsplash.com/photo-1490645935967-10de6ba17061"),
url("https://images.unsplash.com/photo-1505576399279-565b52d4ac71");

background-size: cover;
background-position: center;
background-repeat: no-repeat;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

/* Dark overlay for readability */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

.container{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0px 10px 30px rgba(0,0,0,0.3);
width:350px;
text-align:center;
}

h1{
color:#333;
margin-bottom:25px;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#cc0000;
}

.result{
margin-top:20px;
font-size:18px;
}

.bmi{
font-size:24px;
font-weight:bold;
color:#0072ff;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Fitness Planner</h1>

<form method="POST">

<input type="number" step="0.1" name="weight" placeholder="Enter Weight (kg)" required>

<input type="number" step="0.01" name="height" placeholder="Enter Height (m)" required>

<button type="submit">Calculate BMI</button>

</form>

<div class="result">
</div>

{% endif %}

</div>

</body>
</html>
